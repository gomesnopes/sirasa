<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIRASA Edukasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        .auth-tab-active { border-bottom: 2px solid #e11d48; color: #e11d48; font-weight: bold; }
        .auth-tab-inactive { color: #64748b; font-weight: medium; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800 relative overflow-hidden">

    <div class="absolute inset-0 bg-gradient-to-br from-slate-100 to-rose-50 z-0"></div>
    <div class="absolute top-10 left-10 w-72 h-72 bg-rose-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 z-0"></div>
    <div class="absolute bottom-10 right-10 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 z-0"></div>

    <div class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 relative z-10 border border-slate-100/50 backdrop-blur-sm">
        <a href="index.html" class="absolute top-6 left-6 text-slate-400 hover:text-rose-600 transition">
            <i class="fa-solid fa-arrow-left text-lg"></i>
        </a>

        <div id="auth-notice" class="hidden mt-8 mb-4 bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-xl text-xs font-semibold flex flex-col sm:flex-row items-center gap-2 text-center sm:text-left">
            <i class="fa-solid fa-circle-exclamation text-amber-500 text-base"></i>
            <span>Silakan masuk atau daftar terlebih dahulu untuk memulai misi belajar dan mengumpulkan XP!</span>
        </div>

        <div class="text-center mb-8 mt-6">
            <div class="w-16 h-16 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 rotate-3 shadow-sm border border-rose-100">
                <i class="fa-solid fa-ribbon"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800">Agen Perubahan SIRASA</h2>
            <p class="text-slate-500 text-sm mt-1">Gabung sekarang, perkaya wawasanmu, dan kumpulkan poin edukasinya.</p>
        </div>

        <div class="flex border-b border-slate-200 mb-6">
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 pb-3 text-center transition auth-tab-active">Masuk</button>
            <button onclick="switchTab('daftar')" id="tab-daftar" class="flex-1 pb-3 text-center transition auth-tab-inactive">Daftar Baru</button>
        </div>

        <div id="form-login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" id="login-email" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none bg-slate-50 transition" placeholder="contoh@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="login-password" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none bg-slate-50 transition" placeholder="••••••••">
            </div>
            <button onclick="prosesLogin()" id="btn-login" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3.5 rounded-xl shadow-md transition mt-4 flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Akun
            </button>
        </div>

        <div id="form-daftar" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
                <input type="text" id="reg-nama" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none bg-slate-50">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Kelamin</label>
                    <select id="reg-gender" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl outline-none focus:ring-rose-500 bg-slate-50">
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Kategori Peserta</label>
                    <select id="reg-kategori" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl outline-none focus:ring-rose-500 bg-slate-50">
                        <option value="Pelajar">Pelajar</option>
                        <option value="Mahasiswa">Mahasiswa</option>
                        <option value="Umum">Umum</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
                <input type="date" id="reg-tgl" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl outline-none focus:ring-rose-500 bg-slate-50">
            </div>
            <div class="pt-3 border-t border-slate-100">
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" id="reg-email" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl outline-none focus:ring-rose-500 bg-slate-50">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Buat Password</label>
                <input type="password" id="reg-password" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl outline-none focus:ring-rose-500 bg-slate-50">
            </div>
            <button onclick="prosesDaftar()" id="btn-daftar" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl shadow-md transition mt-4">
                Daftar Menjadi Agen
            </button>
        </div>
    </div>

    <script>
        let supabaseClient;

        try {
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('pesan') === 'wajib_login') {
                document.getElementById('auth-notice').classList.remove('hidden');
            }
            cekKondisiLogin();
        } catch (err) { console.error(err); }

        async function cekKondisiLogin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) window.location.href = 'index.html';
        }

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-daftar').classList.toggle('hidden', isLogin);
            
            document.getElementById('tab-login').className = `flex-1 pb-3 text-center transition ${isLogin ? 'auth-tab-active' : 'auth-tab-inactive'}`;
            document.getElementById('tab-daftar').className = `flex-1 pb-3 text-center transition ${isLogin ? 'auth-tab-inactive' : 'auth-tab-active'}`;
        }

        async function prosesDaftar() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const nama = document.getElementById('reg-nama').value;
            const gender = document.getElementById('reg-gender').value;
            const kategori = document.getElementById('reg-kategori').value;
            const tgl = document.getElementById('reg-tgl').value;
            const btn = document.getElementById('btn-daftar');

            if(!email || !password || !nama || !tgl) return alert("Mohon lengkapi semua kolom!");
            
            btn.disabled = true; btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Memproses...";
            
            try { 
                const { data, error } = await supabaseClient.auth.signUp({ email, password }); 
                if (error) throw error; 
                
                if (data.user) { 
                    await supabaseClient.from('profiles').insert([{ 
                        id: data.user.id, nama_lengkap: nama, jenis_kelamin: gender, kategori: kategori, tanggal_lahir: tgl, total_poin: 0 
                    }]); 
                } 
                alert("Pendaftaran Berhasil! Akun Anda siap digunakan untuk mulai misi belajar."); 
                switchTab('login'); 
                document.getElementById('login-email').value = email; 
            } catch (e) { 
                alert("Gagal mendaftar: " + e.message); 
            } finally { 
                btn.disabled = false; btn.innerHTML = "Daftar Menjadi Agen"; 
            }
        }

        async function prosesLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');
            
            if(!email || !password) return alert("Isi email & password!");
            
            btn.disabled = true; btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Memverifikasi...";
            
            try { 
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password }); 
                if (error) throw error; 
                window.location.href = 'index.html'; 
            } catch (e) { 
                alert("Gagal Masuk: Email atau password salah."); 
                btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Akun`; 
            }
        }
    </script>
</body>
</html>
