<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Belajar & Evaluasi - KITA SEBAYA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        window.DFLIP = window.DFLIP || {};
        window.DFLIP.defaults = { webgl: false, soundEnable: true, hideControls: "download,print,more,share,fullscreen,toggle,play" };
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        .modal-enter { animation: fadeIn 0.4s ease-out forwards; }
        .quiz-enter { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ._df_book { height: 100vh !important; width: 100vw !important; margin: 0 !important; }
        input[type="radio"]:checked + span { color: #e11d48; font-weight: bold; }
        .radio-card:has(input[type="radio"]:checked) { border-color: #e11d48; background-color: #fff1f2; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative">

    <div id="nav-atas" class="absolute top-4 left-4 right-4 flex justify-between z-[60] pointer-events-none">
        <button onclick="keluarKeBeranda()" class="pointer-events-auto bg-slate-800/80 backdrop-blur hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold shadow-lg transition flex items-center gap-2 text-sm border border-slate-600"><i class="fa-solid fa-arrow-left"></i> Keluar</button>
        <button id="btn-selesai" onclick="tampilkanKonfirmasiSelesai()" class="hidden pointer-events-auto bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold shadow-lg transition items-center gap-2 text-sm border border-emerald-500"><i class="fa-solid fa-check-double"></i> Selesai Membaca</button>
    </div>

    <div id="wadah-buku" class="w-full h-full flex items-center justify-center absolute inset-0 z-10 transition-opacity duration-500">
        <div class="text-white flex flex-col items-center gap-3"><i class="fa-solid fa-spinner fa-spin text-3xl text-rose-500"></i><p class="font-medium">Menyiapkan modul...</p></div>
    </div>

    <div id="wadah-ujian" class="w-full h-full bg-[#f8fafc] flex items-start justify-center p-4 md:p-8 absolute inset-0 z-20 hidden overflow-y-auto">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-4xl quiz-enter overflow-hidden flex flex-col mt-12 mb-12">
            <div class="bg-indigo-700 text-white px-6 py-4 flex justify-between items-center">
                <h2 class="font-black text-lg" id="header-judul-kuis"><i class="fa-solid fa-pen-clip mr-2"></i> Lembar Evaluasi</h2>
            </div>
            <div class="p-6 md:p-8 flex-1">
                <div id="quiz-content" class="space-y-6">
                    <div class="text-center py-10"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-rose-500 mb-4"></i><p class="text-slate-500">Memuat instrumen...</p></div>
                </div>
            </div>
            <div id="quiz-footer" class="p-6 bg-slate-50 border-t border-slate-200"></div>
        </div>
    </div>

    <div id="modalSelesai" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm modal-enter p-8 text-center relative overflow-hidden">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"><i class="fa-solid fa-book-open-reader"></i></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Modul Selesai!</h3>
            <p id="teks-selesai" class="text-slate-500 text-sm mb-6">Hebat! Kamu telah menyelesaikan materi ini.</p>
            <div class="flex flex-col gap-3">
                <button id="btn-lanjut-kuis" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md transition hidden">Mulai Evaluasi / Kuis</button>
                <button onclick="keluarKeBeranda()" id="btn-tutup-modul" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3.5 rounded-xl shadow-md transition hidden">Kembali ke Menu Utama</button>
                <button onclick="tutupModalSelesai()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-xl transition">Baca Ulang Modul</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient; let loggedInUser = null; let dataBuku = null; let bookId = null; 
        let kuisSudahDipicu = false; let adaKuisInternal = false;
        let waktuMulaiMembaca = Date.now(); let waktuMulaiKuis = 0; let currentQuizData = []; let dimGroups = {}; let idKuisAktif = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof CONFIG === 'undefined') return alert("config.js tidak terbaca!");
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = 'dashboard.html';
            loggedInUser = session.user; 
            bookId = new URLSearchParams(window.location.search).get('id');
            if (!bookId) return keluarKeBeranda();

            try {
                const { data: bukuInfo } = await supabaseClient.from('buku').select('*').eq('id', bookId).single();
                if (!bukuInfo) return keluarKeBeranda();
                dataBuku = bukuInfo;

                const { count } = await supabaseClient.from('kuis').select('*', { count: 'exact', head: true }).eq('id_buku', bookId);
                if(count && count > 0) adaKuisInternal = true;

                if (dataBuku.tipe_konten === 'Hanya Kuis' || dataBuku.tipe_konten === 'Evaluasi Global') {
                    document.getElementById('nav-atas').classList.add('hidden');
                    document.getElementById('wadah-buku').classList.add('hidden');
                    return panggilKuisSekarang(bookId, dataBuku.judul);
                }

                // Paksa selalu ambil file PDF terbaru langsung dari database!
let pdfBersih = dataBuku.file_url;

if (!pdfBersih) {
    alert("Modul PDF belum diunggah atau kosong!");
    return keluarKeBeranda();
}
                document.getElementById('wadah-buku').innerHTML = `<div class="_df_book" id="df_container" source="${pdfBersih}"></div>`;

                window.DFLIP.defaults.onFlip = function(flipbook) {
                    let halSekarang = flipbook.target._activePage || flipbook.target.page; let totalHal = flipbook.target.pageCount || flipbook.options.pageCount;
                    let btnSelesai = document.getElementById('btn-selesai');
                    if (halSekarang && totalHal && halSekarang >= totalHal) {
                        btnSelesai.classList.remove('hidden'); btnSelesai.classList.add('flex');
                        if (!kuisSudahDipicu) { kuisSudahDipicu = true; setTimeout(() => { tampilkanKonfirmasiSelesai(); }, 800); }
                    } else { btnSelesai.classList.add('hidden'); btnSelesai.classList.remove('flex'); kuisSudahDipicu = false; }
                };
                if(window.DFLIP && window.DFLIP.parseBooks) window.DFLIP.parseBooks();
            } catch (err) { alert("Gagal memuat modul."); keluarKeBeranda(); }
        });

        function tampilkanKonfirmasiSelesai() { 
            document.getElementById('modalSelesai').classList.remove('hidden'); 
            const btnKuis = document.getElementById('btn-lanjut-kuis');
            
            if (adaKuisInternal) {
                btnKuis.classList.remove('hidden');
                btnKuis.setAttribute('onclick', `transisiKeKuis('${bookId}', '${dataBuku.judul}')`);
            } else if (dataBuku.id_kuis_terkait && dataBuku.id_kuis_terkait.trim() !== '') {
                btnKuis.classList.remove('hidden');
                btnKuis.setAttribute('onclick', `transisiKeKuis('${dataBuku.id_kuis_terkait}', 'Evaluasi Lanjutan')`);
            } else { 
                document.getElementById('btn-tutup-modul').classList.remove('hidden'); 
            }
        }
        
        function tutupModalSelesai() { document.getElementById('modalSelesai').classList.add('hidden'); kuisSudahDipicu = false; }

        async function simpanDurasiBaca() {
            try { await supabaseClient.from('riwayat_kuis').insert([{ id_user: loggedInUser.id, id_buku: bookId, poin_didapat: 0, durasi_baca_detik: Math.floor((Date.now() - waktuMulaiMembaca) / 1000), jenis_tes: "Membaca Modul PDF", dimensi: "Aktivitas" }]); } catch(e) {}
        }

        async function keluarKeBeranda() { document.body.style.cursor = 'wait'; await simpanDurasiBaca(); window.location.href = 'dashboard.html'; }

        async function transisiKeKuis(targetIdKuis, judulTarget) {
            document.getElementById('btn-lanjut-kuis').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyiapkan Evaluasi...';
            await simpanDurasiBaca(); 
            tutupModalSelesai();
            
            document.getElementById('nav-atas').classList.add('hidden');
            document.getElementById('wadah-buku').classList.add('opacity-0');
            setTimeout(() => { document.getElementById('wadah-buku').classList.add('hidden'); }, 500);
            panggilKuisSekarang(targetIdKuis, judulTarget);
        }

        async function panggilKuisSekarang(targetId, judulKuis) {
            idKuisAktif = targetId;
            document.getElementById('header-judul-kuis').innerHTML = `<i class="fa-solid fa-pen-clip mr-2"></i> ${judulKuis}`;
            document.getElementById('wadah-ujian').classList.remove('hidden');
            
            try {
                const { data } = await supabaseClient.from('kuis').select('*').eq('id_buku', targetId).order('id', { ascending: true });
                if(!data || data.length === 0) { alert("Tidak ada soal pada modul ini."); return keluarKeBeranda(); }
                
                currentQuizData = data; waktuMulaiKuis = Date.now(); renderSoalKeseluruhan();
            } catch(e) { alert("Gagal mengambil soal."); keluarKeBeranda(); }
        }

        function renderSoalKeseluruhan() {
            const container = document.getElementById('quiz-content'); dimGroups = {};
            currentQuizData.forEach(q => { const dim = q.dimensi || 'Umum'; if(!dimGroups[dim]) dimGroups[dim] = []; dimGroups[dim].push(q); });

            let htmlKuis = `<form id="form-evaluasi" onsubmit="event.preventDefault(); prosesKirimEvaluasi();">`;
            let nomorGlobal = 1;

            Object.keys(dimGroups).forEach((namaDimensi) => {
                htmlKuis += `<div class="mb-8 border-2 border-slate-100 bg-white rounded-2xl shadow-sm overflow-hidden quiz-enter"><div class="bg-indigo-50 px-5 py-4 border-b border-indigo-100 flex items-center gap-3"><i class="fa-solid fa-tags text-indigo-500"></i><h3 class="font-black text-indigo-800 uppercase tracking-wide text-sm md:text-base">Dimensi: ${namaDimensi}</h3></div><div class="p-5 md:p-8 space-y-10">`;
                dimGroups[namaDimensi].forEach(soal => {
                    let htmlOpsi = '';
                    if (soal.opsi_jawaban) {
                        const keys = Object.keys(soal.opsi_jawaban); htmlOpsi = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">`;
                        keys.forEach(k => {
                            const opt = soal.opsi_jawaban[k]; const teks = typeof opt === 'string' ? opt : opt.teks;
                            const poinVal = typeof opt === 'string' ? (k === soal.jawaban_benar ? (soal.poin_reward||1) : 0) : parseInt(opt.poin || 0);
                            htmlOpsi += `<label class="radio-card flex items-start gap-3 p-4 border-2 border-slate-100 rounded-xl cursor-pointer transition hover:bg-slate-50"><input type="radio" name="jawaban_${soal.id}" value="${k}" data-poin="${poinVal}" class="mt-1 w-4 h-4 accent-rose-600 shrink-0" required><span class="text-slate-600 font-medium text-sm leading-snug">${teks}</span></label>`;
                        }); htmlOpsi += `</div>`;
                    }
                    htmlKuis += `<div><p class="font-bold text-slate-800 text-base md:text-lg leading-relaxed"><span class="text-rose-500 mr-2">${nomorGlobal}.</span>${soal.pertanyaan}</p>${htmlOpsi}</div>`;
                    nomorGlobal++;
                }); htmlKuis += `</div></div>`;
            });

            htmlKuis += `</form>`; container.innerHTML = htmlKuis;
            document.getElementById('quiz-footer').innerHTML = `<button type="submit" form="form-evaluasi" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-lg"><i class="fa-solid fa-paper-plane"></i> Kirim Jawaban Evaluasi</button>`;
        }

        async function prosesKirimEvaluasi() {
            const form = document.getElementById('form-evaluasi');
            if(!form.checkValidity()) { form.reportValidity(); return; }
            if(!confirm("Yakin ingin mengirim evaluasi?")) return;

            const btn = document.querySelector('#quiz-footer button'); btn.disabled = true; btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Menyimpan...";

            const formData = new FormData(form); let totalPoinDiDapat = 0; const payloadRiwayat = [];
            const durasiKuisReal = Math.floor((Date.now() - waktuMulaiKuis) / 1000);

            Object.keys(dimGroups).forEach(namaDimensi => {
                let skorDimensi = 0; let rekamanJawaban = {}; 
                dimGroups[namaDimensi].forEach(q => {
                    const jwbUser = formData.get(`jawaban_${q.id}`);
                    if (q.opsi_jawaban && q.opsi_jawaban[jwbUser]) {
                        const opt = q.opsi_jawaban[jwbUser]; skorDimensi += (typeof opt === 'string' ? (jwbUser === q.jawaban_benar ? (q.poin_reward||1) : 0) : parseInt(opt.poin || 0));
                        rekamanJawaban[q.id] = jwbUser; 
                    }
                });
                totalPoinDiDapat += skorDimensi;
                
                payloadRiwayat.push({
                    id_user: loggedInUser.id, id_buku: idKuisAktif, poin_didapat: skorDimensi, durasi_baca_detik: durasiKuisReal,
                    jenis_tes: dataBuku.tipe_konten === 'Evaluasi Global' ? `${dataBuku.judul} - ${namaDimensi}` : dataBuku.judul,
                    dimensi: namaDimensi, detail_jawaban: rekamanJawaban
                });
            });

            try {
                // LOGIKA PRE-TEST: Jika judul mengandung "Pre-Test", jangan beri XP
                const isPreTest = dataBuku.judul.toLowerCase().includes('pre-test') || dataBuku.judul.toLowerCase().includes('pre test');
                const xpYangDitambahkan = isPreTest ? 0 : totalPoinDiDapat;

                if (xpYangDitambahkan > 0) {
                    const { data: profil } = await supabaseClient.from('profiles').select('total_poin').eq('id', loggedInUser.id).single();
                    await supabaseClient.from('profiles').update({ total_poin: (profil.total_poin || 0) + xpYangDitambahkan }).eq('id', loggedInUser.id);
                }
                
                const { error: errRiwayat } = await supabaseClient.from('riwayat_kuis').insert(payloadRiwayat);
                if (errRiwayat) throw errRiwayat;

                document.getElementById('wadah-ujian').classList.add('hidden'); 
                
                // Tampilan Selesai berdasarkan tipe tes
                let uiPoin = isPreTest 
                    ? `<div class="bg-indigo-50 border border-indigo-200 px-6 py-4 rounded-xl mb-6"><span class="text-indigo-700 font-bold text-sm">Terima kasih! Tahap evaluasi awal telah selesai direkam.</span></div>`
                    : `<div class="inline-block bg-rose-50 border border-rose-200 px-8 py-4 rounded-2xl mb-8 shadow-sm"><span class="text-rose-600 font-black text-xl">+ ${xpYangDitambahkan} XP!</span></div>`;

                const htmlSukses = `
                    <div class="w-full h-full bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-6 absolute inset-0 z-50">
                        <div class="text-center py-10 bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full quiz-enter border border-slate-200">
                            <div class="w-24 h-24 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-trophy text-rose-500 text-5xl"></i></div>
                            <h3 class="text-2xl font-black text-slate-800 mb-2">Penyelesaian Berhasil!</h3>
                            <p class="text-slate-500 mb-6 text-sm">Respon Anda telah tercatat di dalam sistem.</p>
                            ${uiPoin}
                            <button onclick="window.location.href='dashboard.html'" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md"><i class="fa-solid fa-house mr-2"></i> Kembali ke Menu Utama</button>
                        </div>
                    </div>`;
                    
                document.body.insertAdjacentHTML('beforeend', htmlSukses);
            } catch (err) { alert("Gagal mengirim data: " + err.message); btn.disabled = false; btn.innerHTML = `Coba Kirim Ulang`; }
        }
    </script>
</body>
</html>
