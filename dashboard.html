<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Modul KITA SEBAYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>window.DFLIP = window.DFLIP || {}; window.DFLIP.defaults = { webgl: false, soundEnable: true, hideControls: "download,print,more,share,fullscreen,toggle,play" };</script>
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-enter { animation: zoomIn 0.3s ease-out forwards; } @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        ._df_book { height: 100% !important; width: 100% !important; margin: 0 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <nav class="glass-nav shadow-sm border-b border-slate-200 px-4 md:px-8 py-3 flex justify-between items-center sticky top-0 z-40 transition-all">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="window.location.reload()">
                <div class="w-10 h-10 bg-rose-600 text-white rounded-xl flex items-center justify-center text-xl shadow-lg shadow-rose-500/30 group-hover:scale-105 transition transform"><i class="fa-solid fa-ribbon"></i></div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">KITA SEBAYA</h1>
            </div>
         </div>
        <div id="user-menu-container" class="transition-opacity duration-500"></div>
    </nav>

    <main class="flex-1 max-w-[1400px] w-full mx-auto px-4 md:px-8 py-8 flex flex-col lg:flex-row gap-8">
        <div class="flex-1 w-full lg:w-3/4">
            <div id="user-banner" class="bg-gradient-to-r from-rose-600 to-indigo-800 rounded-3xl p-8 text-white shadow-lg mb-8 relative overflow-hidden fade-in">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -translate-y-1/2 translate-x-1/3"></div>
                <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <h2 class="text-3xl font-black mb-2" id="greet-name">Halo! 👋</h2>
                        <p class="text-rose-100 font-medium max-w-xl text-sm md:text-base leading-relaxed">Siap memperkaya wawasan kesehatan hari ini? Ikuti instruksi dan taklukkan peringkat tertinggi!</p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md border border-white/20 px-6 py-4 rounded-2xl text-center shrink-0 w-full md:w-auto">
                        <p class="text-rose-200 text-xs font-bold uppercase tracking-wider mb-1">Total Poin Kamu</p>
                        <div class="text-3xl font-black flex items-center justify-center gap-2"><i class="fa-solid fa-star text-amber-400"></i> <span id="greet-xp">0</span> <span class="text-lg font-bold text-rose-200">XP</span></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <div><h3 class="text-2xl font-black text-slate-800 flex items-center gap-2"><i class="fa-solid fa-book-medical text-rose-600"></i> Koleksi Modul</h3></div>
                <div class="flex bg-slate-200/70 p-1 rounded-xl w-full md:w-auto overflow-x-auto">
                    <button onclick="filterBuku('Semua', this)" class="filter-btn active-filter px-5 py-2 text-sm font-bold rounded-lg transition-all bg-white text-rose-600 shadow-sm">Semua</button>
                    <button onclick="filterBuku('Materi Inti', this)" class="filter-btn px-5 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all">Materi</button>
                     <button onclick="filterBuku('Evaluasi', this)" class="filter-btn px-5 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all">Kuis</button>               
                </div>
            </div>
            <div id="bookList" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-5 md:gap-6 min-h-[300px]"></div>
        </div>

        <aside class="w-full lg:w-1/4 shrink-0">
            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 sticky top-24 fade-in">
                <div class="text-center mb-6"><div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-3 rotate-3"><i class="fa-solid fa-trophy"></i></div><h3 class="text-xl font-black text-slate-800">Agen Peduli Top</h3><p class="text-xs text-slate-500 mt-1 font-medium">Peringkat 5 Besar Global</p></div>
                <div id="leaderboard-list" class="space-y-3"></div>
            </div>
        </aside>
    </main>

    <div id="modalIntroSystem" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden relative modal-enter">
            <div class="bg-slate-50 px-6 py-4 border-b flex justify-between items-center z-10 shrink-0">
                <h3 class="font-bold text-lg text-slate-800"><i class="fa-solid fa-book-open-reader text-indigo-500 mr-2"></i> Pengantar Pembelajaran</h3>
                <button onclick="tutupModalIntro()" class="text-slate-400 hover:text-rose-500 transition px-3 py-1 bg-white border border-slate-200 rounded-lg text-sm font-bold shadow-sm">Tutup Pengantar <i class="fa-solid fa-xmark ml-1"></i></button>
            </div>
            <div id="wadah-flipbook-intro" class="flex-1 w-full bg-slate-200 relative"></div>
        </div>
    </div>

    <script>
        let supabaseClient; let loggedInUser = null; let semuaBuku = []; 

        document.addEventListener('DOMContentLoaded', () => {
            try { if (typeof CONFIG === 'undefined') throw new Error("config.js tidak terbaca!"); supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY); cekStatusLogin(); } catch (err) {}
        });

        async function cekStatusLogin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index'; return; } // PERBAIKAN: Usir ke index
            
            loggedInUser = session.user;
            const menuContainer = document.getElementById('user-menu-container');
            const { data: profil } = await supabaseClient.from('profiles').select('*').eq('id', loggedInUser.id).single();
            
            if (profil) {
                menuContainer.innerHTML = `
                    <div class="flex items-center gap-3 md:gap-4">
                        <a href="profil" class="flex items-center gap-3 group cursor-pointer bg-slate-50 border border-slate-200 py-1.5 px-2 md:pr-4 rounded-full transition hover:bg-white hover:shadow-sm">
                            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-tr from-rose-600 to-indigo-600 text-white flex items-center justify-center font-bold text-sm md:text-lg uppercase shadow-sm group-hover:scale-105 transition transform">${profil.nama_lengkap.charAt(0)}</div>
                            <div class="text-left hidden sm:block group-hover:opacity-80 transition"><p class="text-xs md:text-sm font-bold text-slate-800 leading-tight">${profil.nama_lengkap.split(' ')[0]}</p><p class="text-[10px] md:text-xs font-black text-emerald-600">${profil.total_poin} XP</p></div>
                        </a>
                        <button onclick="prosesLogout()" class="w-10 h-10 bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition flex items-center justify-center" title="Keluar"><i class="fa-solid fa-right-from-bracket"></i></button>
                    </div>`;

                document.getElementById('greet-name').innerText = `Halo, ${profil.nama_lengkap.split(' ')[0]}! 👋`;
                document.getElementById('greet-xp').innerText = profil.total_poin.toLocaleString('id-ID');
                
                fetchBooks(); fetchLeaderboard();

                
            }
        }

        function tampilkanModalIntro(fileUrl) { document.getElementById('modalIntroSystem').classList.remove('hidden'); document.getElementById('wadah-flipbook-intro').innerHTML = `<div class="_df_book" source="${fileUrl}" id="df_manual_intro"></div>`; if(window.DFLIP && window.DFLIP.parseBooks) window.DFLIP.parseBooks(); }
        function tutupModalIntro() { document.getElementById('modalIntroSystem').classList.add('hidden'); document.getElementById('wadah-flipbook-intro').innerHTML = ''; }
        async function prosesLogout() { if(confirm("Yakin ingin keluar?")) { await supabaseClient.auth.signOut(); sessionStorage.removeItem('introSudahDilihat'); window.location.href = 'index'; } }
        function arahkanMembaca(idBuku, urlFile) { window.location.href = `buku?id=${idBuku}&file=${encodeURIComponent(urlFile || '')}`; }
        function alertTerkunci() { alert('🔒 Modul ini masih terkunci! Tunggu instruksi peneliti untuk membukanya.'); }

        function filterBuku(kategori, btnElement) {
            document.querySelectorAll('.filter-btn').forEach(btn => { btn.classList.remove('bg-white', 'text-rose-600', 'shadow-sm', 'active-filter'); btn.classList.add('text-slate-500'); });
            btnElement.classList.add('bg-white', 'text-rose-600', 'shadow-sm', 'active-filter'); btnElement.classList.remove('text-slate-500');
            const filtered = kategori === 'Semua' ? semuaBuku : semuaBuku.filter(b => b.kategori === kategori); renderGridBuku(filtered);
        }

        async function fetchBooks() {
            try {
                const { data } = await supabaseClient.from('buku').select('*').neq('tipe_konten', 'Pengantar Sistem').order('created_at', { ascending: true });
                if (!data || data.length === 0) { document.getElementById('bookList').innerHTML = `<div class="col-span-full text-center text-slate-400 py-10"><i class="fa-solid fa-folder-open text-4xl mb-3 text-slate-300"></i><p>Belum ada modul di perpustakaan.</p></div>`; return; }
                semuaBuku = data; renderGridBuku(semuaBuku);
            } catch (err) {}
        }

        function renderGridBuku(dataBuku) {
    const bookList = document.getElementById('bookList'); 
    bookList.innerHTML = '';
    
    if (dataBuku.length === 0) { 
        bookList.innerHTML = `<div class="col-span-full text-center text-slate-400 py-10 fade-in"><p>Tidak ada modul dalam kategori ini.</p></div>`; 
        return; 
    }

    dataBuku.forEach((book, index) => {
        const isLocked = book.is_active === false || book.is_active === null; 
        
        // 1. LOGIKA COVER
        let cover = "";
        if (book.cover_url) { 
            cover = `<img src="${book.cover_url}" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 ${isLocked ? '' : 'group-hover:scale-110'}">`; 
        } else { 
            if (book.judul.toLowerCase().includes('pre-test')) { 
                cover = `<div class="w-full h-full bg-indigo-600 flex flex-col items-center justify-center text-white"><i class="fa-solid fa-clipboard-question text-5xl opacity-30 mb-2"></i><span class="font-black text-xs tracking-widest">PRE-TEST</span></div>`; 
            } else if (book.judul.toLowerCase().includes('post-test')) { 
                cover = `<div class="w-full h-full bg-emerald-600 flex flex-col items-center justify-center text-white"><i class="fa-solid fa-clipboard-check text-5xl opacity-30 mb-2"></i><span class="font-black text-xs tracking-widest">POST-TEST</span></div>`; 
            } else if (book.tipe_konten === 'Hanya Kuis') {
                // Tambahan: Cover default khusus jika dia Hanya Kuis
                cover = `<div class="w-full h-full bg-amber-500 flex flex-col items-center justify-center text-white"><i class="fa-solid fa-list-check text-5xl opacity-30 mb-2"></i><span class="font-black text-xs tracking-widest">KUIS</span></div>`;
            } else { 
                cover = `<div class="w-full h-full bg-slate-200 flex items-center justify-center"><i class="fa-regular fa-file-pdf text-6xl text-slate-400"></i></div>`; 
            } 
        }
        
        // 2. LOGIKA BADGE
        let badgeColor = "text-rose-700 bg-white/90"; 
        let badgeText = book.kategori;
        
        if (book.judul.toLowerCase().includes('post-test')) { 
            badgeText = "POST-TEST"; 
            badgeColor = "text-emerald-700 bg-emerald-50 border border-emerald-200 shadow-sm"; 
        } else if (book.judul.toLowerCase().includes('pre-test')) { 
            badgeText = "PRE-TEST"; 
            badgeColor = "text-indigo-700 bg-indigo-50 border border-indigo-200 shadow-sm"; 
        } else if (book.tipe_konten === 'Hanya Kuis') { 
            // KONDISI DIPISAH: Modul "Hanya Kuis" kini punya badgenya sendiri
            badgeText = "KUIS"; 
            badgeColor = "text-amber-700 bg-amber-50 border border-amber-200 shadow-sm"; 
        }

        // 3. LOGIKA STYLE & RENDER
        const actionClick = isLocked ? `alertTerkunci()` : `arahkanMembaca('${book.id}', '${book.file_url}')`;
        const cardStyle = isLocked ? "grayscale opacity-75 cursor-not-allowed border-slate-200" : "card-hover group cursor-pointer border-slate-100";
        const btnBawahStyle = isLocked ? "bg-slate-100 text-slate-400 border-transparent" : "bg-slate-50 hover:bg-rose-600 text-rose-600 hover:text-white border-slate-100";
        const btnBawahText = isLocked ? '<i class="fa-solid fa-lock"></i> Terkunci' : '<i class="fa-solid fa-book-open"></i> Buka Konten';
        const overlayContent = isLocked ? `<div class="bg-slate-800/90 text-white font-bold py-2.5 px-6 rounded-full text-sm shadow-xl flex items-center gap-2 border border-slate-600"><i class="fa-solid fa-lock"></i> Belum Dibuka</div>` : `<button class="bg-white text-rose-600 font-bold py-2.5 px-6 rounded-full text-sm transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-xl">Mulai Sekarang</button>`;

        bookList.innerHTML += `
            <div class="bg-white rounded-2xl p-3 border flex flex-col h-full transition-all duration-300 fade-in ${cardStyle}" style="animation-delay: ${index * 0.05}s; opacity: 0;">
                <div class="aspect-[3/4] rounded-xl overflow-hidden relative shadow-inner bg-slate-100 shrink-0" onclick="${actionClick}">
                    ${cover}
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-transparent to-transparent opacity-0 ${isLocked ? 'opacity-100 bg-slate-900/30' : 'group-hover:opacity-100'} transition-opacity duration-300 flex items-end justify-center pb-5">
                        ${overlayContent}
                    </div>
                    <span class="absolute top-3 right-3 ${badgeColor} px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-wide backdrop-blur-md">
                        ${badgeText}
                    </span>
                </div>
                <div class="pt-4 flex flex-col flex-grow text-center px-1">
                    <h4 class="font-bold text-sm md:text-base text-slate-800 mb-4 flex-grow line-clamp-2 leading-snug ${isLocked ? '' : 'group-hover:text-rose-600'} transition-colors" onclick="${actionClick}">
                        ${book.judul}
                    </h4>
                    <button onclick="${actionClick}" class="w-full py-2.5 rounded-xl text-xs md:text-sm font-bold transition-colors border flex items-center justify-center gap-2 mt-auto ${btnBawahStyle}">
                        ${btnBawahText}
                    </button>
                </div>
            </div>`;
    });
}


        async function fetchLeaderboard() {
            try {
                const { data } = await supabaseClient.from('profiles').select('nama_lengkap, total_poin, kategori').gt('total_poin', 0).order('total_poin', { ascending: false }).limit(5);
                const wadah = document.getElementById('leaderboard-list'); wadah.innerHTML = '';
                if (!data || data.length === 0) { wadah.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Belum ada agen yang mencetak skor.</p>'; return; }
                data.forEach((p, index) => {
                    const inisial = p.nama_lengkap.charAt(0).toUpperCase(); let rankIcon = `<span class="font-bold text-slate-400 w-5 text-center">${index + 1}</span>`; let bgAvatar = "bg-slate-100 text-slate-600";
                    if (index === 0) { rankIcon = `<i class="fa-solid fa-medal text-amber-400 text-xl w-5 text-center drop-shadow-sm"></i>`; bgAvatar = "bg-gradient-to-br from-amber-300 to-amber-500 text-white shadow-md"; } else if (index === 1) { rankIcon = `<i class="fa-solid fa-medal text-slate-300 text-lg w-5 text-center"></i>`; bgAvatar = "bg-slate-200 text-slate-700"; } else if (index === 2) { rankIcon = `<i class="fa-solid fa-medal text-amber-700 text-lg w-5 text-center"></i>`; bgAvatar = "bg-amber-100 text-amber-800"; }
                    wadah.innerHTML += `<div class="flex items-center justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100 cursor-default"><div class="flex items-center gap-3 overflow-hidden">${rankIcon}<div class="w-9 h-9 rounded-full ${bgAvatar} flex items-center justify-center font-black text-sm shrink-0">${inisial}</div><div class="flex flex-col min-w-0"><span class="font-bold text-sm text-slate-800 truncate">${p.nama_lengkap.split(' ')[0]}</span><span class="text-[9px] font-bold uppercase text-slate-400 tracking-wide truncate">${p.kategori}</span></div></div><div class="shrink-0 text-right ml-2"><span class="font-black text-emerald-500 text-sm">${p.total_poin}</span><br><span class="text-[9px] font-bold text-slate-400 uppercase">XP</span></div></div>`;
                });
            } catch (err) {}
        }
    </script>
</body>
</html>
